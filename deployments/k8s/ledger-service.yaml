apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
        - name: ledger-service
          image: ledger-service-image
          ports:
            - containerPort: 8082
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          env:
            - name: LEDGER_DB_HOST
              value: postgres-ledger
            - name: LEDGER_DB_PORT
              value: "5432"
            - name: LEDGER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-ledger-credentials
                  key: username
            - name: LEDGER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-ledger-credentials
                  key: password
            - name: LEDGER_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-ledger-credentials
                  key: database
            - name: LEDGER_DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: uri
            - name: LEDGER_HTTP_PORT
              value: "8082"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_EXPORTER_OTLP_INSECURE
