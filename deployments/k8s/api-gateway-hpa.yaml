apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  labels:
    app: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale when Memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up
      policies:
      - type: Percent
        value: 100                      # Double the number of pods
        periodSeconds: 60
      - type: Pods
        value: 2                        # Add up to 2 pods
        periodSeconds: 60
      selectPolicy: Max                 # Use the most aggressive policy
    scaleDown:
      stabilizationWindowSeconds: 200   # Wait 3min before scaling down
      policies:
      - type: Percent
        value: 50                       # Remove 50% of the pods
        periodSeconds: 60
      - type: Pods
        value: 1                        # Remove up to 1 pod
        periodSeconds: 60
      selectPolicy: Min                 # Use the most conservative policy