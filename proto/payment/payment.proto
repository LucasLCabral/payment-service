syntax = "proto3";

package payment;

import "proto/common/common.proto";

option go_package = "github.com/LucasLCabral/payment-service/protog/payment;payment";

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
}

message CreatePaymentRequest {
  string idempotency_key = 1;
  int64 amount_cents = 2;
  common.Currency currency = 3;
  string payer_id = 4;
  string payee_id = 5;
  string description = 6;
}

message CreatePaymentResponse {
  string payment_id = 1;
  common.PaymentStatus status = 2;
  string created_at = 3;
}

message GetPaymentRequest { string payment_id = 1; }

message GetPaymentResponse {
  string payment_id = 1;
  common.PaymentStatus status = 2;
  int64 amount_cents = 3;
  common.Currency currency = 4;
  string payer_id = 5;
  string payee_id = 6;
  string created_at = 7;
  string updated_at = 8;
  string decline_reason = 9;
}
